<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IGA logo">
  <defs>
    <linearGradient id="igaBrandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d3a66" />
      <stop offset="100%" stop-color="#4f8af5" />
    </linearGradient>
  </defs>

  <rect width="40" height="40" rx="10" fill="url(#igaBrandGradient)" />

  <!-- Ascending growth bars -->
  <rect x="9" y="22" width="5" height="9" rx="1.2" fill="#ffffff" fill-opacity="0.55" />
  <rect x="17" y="17" width="5" height="14" rx="1.2" fill="#ffffff" fill-opacity="0.75" />
  <rect x="25" y="10" width="5" height="21" rx="1.2" fill="#ffffff" />

  <!-- Upward trend arrow tying the bars together -->
  <path
    d="M9 23 L17 16 L22 19 L30 9"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M24 9 L30 9 L30 15"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
